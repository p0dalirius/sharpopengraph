name: Lint

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint:
    name: Lint C# Code
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Shallow clones should be disabled for better analysis

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore SharpOpenGraph.sln

    - name: Build solution
      run: dotnet build SharpOpenGraph.sln --no-restore --configuration Release
      continue-on-error: false

    - name: Run dotnet format (verify no changes)
      run: dotnet format SharpOpenGraph.sln --verify-no-changes --verbosity diagnostic
      continue-on-error: false

    - name: Check for build warnings and errors
      run: dotnet build SharpOpenGraph.sln --no-restore --configuration Release
      continue-on-error: false
